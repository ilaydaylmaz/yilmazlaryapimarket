<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Ürün Yönetimi</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📦 Admin Panel</h1>
    <div class="header-actions">
      <button class="btn-tab" id="productsTab" onclick="showTab('products')">📦 Ürünler</button>
      <button class="btn-tab active" id="messagesTab" onclick="showTab('messages')">💬 Mesajlar</button>
      <a href="/logout" class="btn-logout">🚪 Çıkış Yap</a>
    </div>
  </div>

  <div class="content">
    <!-- Mesajlar Bölümü -->
    <div id="messagesSection" class="messages-section" style="display: none;">
      <h2>💬 İletişim Formu Mesajları (<span id="mesaj-sayisi">0</span>)</h2>
      <div class="messages-list" id="messagesList">
        <div class="empty-state">Yükleniyor...</div>
      </div>
    </div>

    <!-- Form Bölümü -->
    <div id="productsSection" class="form-section">
      <h2>➕ Yeni Ürün Ekle / Düzenle</h2>
      
      <div id="secili-urun" class="selected-product-info">
        <strong>Düzenleniyor:</strong> <span id="secili-urun-ad"></span>
      </div>

      <form id="productForm" onsubmit="event.preventDefault(); seciliId ? guncelle() : ekle();">
        <div class="form-group">
          <label for="ad">Ürün Adı *</label>
          <input type="text" id="ad" required placeholder="Örn: Sprey Boya 200ml">
        </div>

        <div class="form-group">
          <label for="kategori">Kategori</label>
          <select id="kategori">
            <option value="">Kategori Seçin</option>
            <option value="Boya">Boya</option>
            <option value="Hırdavat">Hırdavat</option>
            <option value="Elektrik">Elektrik</option>
            <option value="Tesisat">Tesisat</option>
            <option value="Yapı Malzemeleri">Yapı Malzemeleri</option>
            <option value="Aletler">Aletler</option>
            <option value="Diğer">Diğer</option>
          </select>
          <div class="quick-categories">
            <button type="button" class="category-chip" onclick="setKategori('Boya')">Boya</button>
            <button type="button" class="category-chip" onclick="setKategori('Hırdavat')">Hırdavat</button>
            <button type="button" class="category-chip" onclick="setKategori('Elektrik')">Elektrik</button>
            <button type="button" class="category-chip" onclick="setKategori('Tesisat')">Tesisat</button>
          </div>
        </div>

        <div class="form-group">
          <label for="marka">Marka</label>
          <input type="text" id="marka" placeholder="Örn: Polisan, Bosch, etc.">
        </div>

        <div class="form-group">
          <label for="aciklama">Açıklama</label>
          <textarea id="aciklama" placeholder="Ürün hakkında detaylı bilgi..."></textarea>
        </div>

        <div class="form-group">
          <label for="resim">Ürün Resmi</label>
          <input type="file" id="resim" accept="image/*" onchange="previewImage(this)">
          <div class="image-preview" id="imagePreview">
            <img id="previewImg" src="" alt="Önizleme">
          </div>
        </div>

        <div class="button-group">
          <button type="submit" class="btn btn-primary" id="submitBtn">
            ➕ Yeni Ürün Ekle
          </button>
          <button type="button" class="btn btn-success" id="updateBtn" onclick="guncelle()" style="display: none;">
            💾 Güncelle
          </button>
          <button type="button" class="btn btn-secondary" onclick="temizle()">
            🗑️ Temizle
          </button>
        </div>
      </form>
    </div>

    <!-- Ürünler Listesi -->
    <div class="products-section">
      <h2>📋 Mevcut Ürünler (<span id="urun-sayisi">0</span>)</h2>
      <div class="products-list" id="liste">
        <div class="empty-state">Yükleniyor...</div>
      </div>
    </div>
  </div>
</div>

<!-- Cevap Modal -->
<div id="replyModal" class="modal" style="display: none;">
  <div class="modal-content">
    <div class="modal-header">
      <h3>💬 Mesaja Cevap Ver</h3>
      <button class="modal-close" onclick="closeReplyModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="replyMessageInfo" class="message-info"></div>
      <div class="form-group">
        <label for="replyText">Cevabınız *</label>
        <textarea id="replyText" rows="6" placeholder="Mesaja cevabınızı yazın..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="sendReply()">📧 Cevabı Gönder</button>
        <button class="btn btn-secondary" onclick="closeReplyModal()">İptal</button>
      </div>
    </div>
  </div>
</div>

<div class="success-message" id="successMessage"></div>

<script>
let seciliId = null;
let allProducts = [];

function setKategori(kat) {
  document.getElementById("kategori").value = kat;
}

function previewImage(input) {
  const preview = document.getElementById("imagePreview");
  const previewImg = document.getElementById("previewImg");
  
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = (e) => {
      previewImg.src = e.target.result;
      preview.classList.add("show");
    };
    reader.readAsDataURL(input.files[0]);
  } else {
    preview.classList.remove("show");
  }
}

function showSuccess(message) {
  const msg = document.getElementById("successMessage");
  msg.textContent = message;
  msg.classList.add("show");
  setTimeout(() => {
    msg.classList.remove("show");
  }, 3000);
}

function yukle() {
  fetch("/api/products")
    .then(r => {
      if (!r.ok) throw new Error("Ürünler yüklenemedi");
      return r.json();
    })
    .then(data => {
      allProducts = data;
      const liste = document.getElementById("liste");
      const sayac = document.getElementById("urun-sayisi");
      
      sayac.textContent = data.length;
      
      if (data.length === 0) {
        liste.innerHTML = '<div class="empty-state">Henüz ürün eklenmemiş. Yukarıdaki formdan ekleyebilirsiniz.</div>';
        return;
      }
      
      liste.innerHTML = "";
      data.forEach(p => {
        const item = document.createElement("div");
        item.className = "product-item";
        item.dataset.id = p.id;
        
        item.innerHTML = `
          <div class="product-info">
            <h3>${p.ad || "İsimsiz Ürün"}</h3>
            <p>${p.kategori ? `📁 ${p.kategori}` : ""} ${p.marka ? `• 🏷️ ${p.marka}` : ""}</p>
          </div>
          <div class="product-actions">
            <button class="btn btn-primary btn-small" onclick="duzenle('${p.id}')">✏️ Düzenle</button>
            <button class="btn btn-danger btn-small" onclick="sil('${p.id}')">🗑️ Sil</button>
          </div>
        `;
        
        liste.appendChild(item);
      });
    })
    .catch(error => {
      console.error("Yükleme hatası:", error);
      document.getElementById("liste").innerHTML = '<div class="empty-state">❌ Ürünler yüklenirken bir hata oluştu!</div>';
    });
}

function duzenle(id) {
  const p = allProducts.find(pr => pr.id === id);
  if (!p) return;
  
  seciliId = String(p.id);
  
  document.getElementById("ad").value = p.ad || "";
  document.getElementById("kategori").value = p.kategori || "";
  document.getElementById("marka").value = p.marka || "";
  document.getElementById("aciklama").value = p.aciklama || "";
  document.getElementById("resim").value = "";
  
  // Görsel geri bildirim
  document.querySelectorAll(".product-item").forEach(item => {
    item.classList.remove("selected");
  });
  const selectedItem = document.querySelector(`[data-id="${p.id}"]`);
  if (selectedItem) {
    selectedItem.classList.add("selected");
    selectedItem.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
  
  // Form butonlarını güncelle
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("updateBtn").style.display = "inline-flex";
  
  // Seçili ürün bilgisini göster
  const seciliInfo = document.getElementById("secili-urun");
  const seciliAd = document.getElementById("secili-urun-ad");
  seciliInfo.classList.add("show");
  seciliAd.textContent = p.ad || "İsimsiz";
  
  // Resim önizlemesini temizle
  document.getElementById("imagePreview").classList.remove("show");
  
  // Forma scroll
  document.querySelector(".form-section").scrollIntoView({ behavior: "smooth" });
}

function ekle() {
  const ad = document.getElementById("ad").value.trim();
  if (!ad) {
    alert("⚠️ Ürün adı zorunludur!");
    return;
  }

  const formData = new FormData();
  formData.append("ad", ad);
  formData.append("kategori", document.getElementById("kategori").value || "");
  formData.append("marka", document.getElementById("marka").value || "");
  formData.append("aciklama", document.getElementById("aciklama").value || "");
  
  const resim = document.getElementById("resim").files[0];
  if (resim) {
    formData.append("resim", resim);
  }

  const submitBtn = document.getElementById("submitBtn");
  const originalText = submitBtn.innerHTML;
  submitBtn.disabled = true;
  submitBtn.innerHTML = "⏳ Ekleniyor...";

  fetch("/api/products", {
    method: "POST",
    body: formData
  })
  .then(response => {
    if (!response.ok) {
      return response.json().then(err => {
        throw new Error(err.message || "Ekleme başarısız!");
      });
    }
    return response.json();
  })
  .then(() => {
    showSuccess("✅ Ürün başarıyla eklendi!");
    temizle();
    yukle();
  })
  .catch(error => {
    alert("❌ Hata: " + error.message);
    console.error("Ekleme hatası:", error);
  })
  .finally(() => {
    submitBtn.disabled = false;
    submitBtn.innerHTML = originalText;
  });
}

function guncelle() {
  if (!seciliId) {
    alert("⚠️ Önce düzenlemek istediğiniz ürünü seçin!");
    return;
  }

  const formData = new FormData();
  formData.append("ad", document.getElementById("ad").value || "");
  formData.append("kategori", document.getElementById("kategori").value || "");
  formData.append("marka", document.getElementById("marka").value || "");
  formData.append("aciklama", document.getElementById("aciklama").value || "");

  const resim = document.getElementById("resim").files[0];
  if (resim) {
    formData.append("resim", resim);
  }

  const updateBtn = document.getElementById("updateBtn");
  const originalText = updateBtn.innerHTML;
  updateBtn.disabled = true;
  updateBtn.innerHTML = "⏳ Güncelleniyor...";

  fetch("/api/products/" + encodeURIComponent(seciliId), {
    method: "PUT",
    body: formData
  })
  .then(response => {
    if (!response.ok) {
      return response.text().then(text => {
        let errorData;
        try {
          errorData = JSON.parse(text);
        } catch (e) {
          errorData = { message: text || "Güncelleme başarısız!" };
        }
        throw new Error(errorData.message || "Güncelleme başarısız!");
      });
    }
    return response.json();
  })
  .then(() => {
    showSuccess("✅ Ürün başarıyla güncellendi!");
    temizle();
    yukle();
  })
  .catch(error => {
    alert("❌ Hata: " + error.message);
    console.error("Güncelleme hatası:", error);
  })
  .finally(() => {
    updateBtn.disabled = false;
    updateBtn.innerHTML = originalText;
  });
}

function sil(id) {
  const product = allProducts.find(p => p.id === id);
  if (!product) return;
  
  if (!confirm(`"${product.ad}" ürününü silmek istediğinize emin misiniz?`)) {
    return;
  }

  fetch("/api/products/" + id, { method: "DELETE" })
    .then(response => {
      if (!response.ok) {
        throw new Error("Silme işlemi başarısız!");
      }
      return response.json();
    })
    .then(() => {
      showSuccess("✅ Ürün başarıyla silindi!");
      yukle();
      if (seciliId === id) {
        temizle();
      }
    })
    .catch(error => {
      alert("❌ Hata: " + error.message);
      console.error("Silme hatası:", error);
    });
}

function temizle() {
  seciliId = null;
  document.getElementById("productForm").reset();
  document.getElementById("imagePreview").classList.remove("show");
  
  document.querySelectorAll(".product-item").forEach(item => {
    item.classList.remove("selected");
  });
  
  document.getElementById("secili-urun").classList.remove("show");
  document.getElementById("submitBtn").style.display = "inline-flex";
  document.getElementById("updateBtn").style.display = "none";
}

// Tab değiştirme
let currentTab = 'products';
function showTab(tab) {
  currentTab = tab;
  if (tab === 'products') {
    document.getElementById('productsSection').style.display = 'block';
    document.getElementById('messagesSection').style.display = 'none';
    document.getElementById('productsTab').classList.add('active');
    document.getElementById('messagesTab').classList.remove('active');
    yukle();
  } else {
    document.getElementById('productsSection').style.display = 'none';
    document.getElementById('messagesSection').style.display = 'block';
    document.getElementById('productsTab').classList.remove('active');
    document.getElementById('messagesTab').classList.add('active');
    yukleMesajlar();
  }
}

// Mesajları yükle
let allMessages = [];
let selectedMessageId = null;

function yukleMesajlar() {
  fetch("/api/contacts")
    .then(r => {
      if (!r.ok) throw new Error("Mesajlar yüklenemedi");
      return r.json();
    })
    .then(data => {
      allMessages = data;
      const liste = document.getElementById("messagesList");
      const sayac = document.getElementById("mesaj-sayisi");
      
      sayac.textContent = data.length;
      
      if (data.length === 0) {
        liste.innerHTML = '<div class="empty-state">Henüz mesaj yok.</div>';
        return;
      }
      
      liste.innerHTML = "";
      data.forEach(m => {
        const item = document.createElement("div");
        item.className = `message-item ${m.cevaplandı ? 'replied' : 'new'}`;
        item.dataset.id = m.id;
        
        const tarih = new Date(m.tarih).toLocaleString('tr-TR');
        const cevapTarihi = m.cevapTarihi ? new Date(m.cevapTarihi).toLocaleString('tr-TR') : null;
        
        item.innerHTML = `
          <div class="message-header">
            <div class="message-meta">
              <h3>${m.adSoyad || 'İsimsiz'}</h3>
              <p class="message-date">📅 ${tarih}</p>
            </div>
            ${m.cevaplandı ? '<span class="badge-replied">✓ Cevaplandı</span>' : '<span class="badge-new">Yeni</span>'}
          </div>
          <div class="message-body">
            <p><strong>📧 E-posta:</strong> <a href="mailto:${m.email}">${m.email}</a></p>
            <p><strong>📞 Telefon:</strong> <a href="tel:${m.telefon}">${m.telefon}</a></p>
            <div class="message-content">
              <strong>💬 Mesaj:</strong>
              <p>${m.mesaj.replace(/\n/g, '<br>')}</p>
            </div>
            ${m.cevaplandı ? `
              <div class="reply-content">
                <strong>📧 Cevabınız (${cevapTarihi}):</strong>
                <p>${m.cevap.replace(/\n/g, '<br>')}</p>
              </div>
            ` : ''}
          </div>
          <div class="message-actions">
            ${!m.cevaplandı ? `<button class="btn btn-primary btn-small" onclick="openReplyModal('${m.id}')">💬 Cevap Ver</button>` : ''}
          </div>
        `;
        
        liste.appendChild(item);
      });
    })
    .catch(error => {
      console.error("Mesaj yükleme hatası:", error);
      document.getElementById("messagesList").innerHTML = '<div class="empty-state">❌ Mesajlar yüklenirken bir hata oluştu!</div>';
    });
}

function openReplyModal(id) {
  const message = allMessages.find(m => m.id === id);
  if (!message) return;
  
  selectedMessageId = id;
  const infoDiv = document.getElementById("replyMessageInfo");
  infoDiv.innerHTML = `
    <p><strong>Gönderen:</strong> ${message.adSoyad}</p>
    <p><strong>E-posta:</strong> ${message.email}</p>
    <p><strong>Telefon:</strong> ${message.telefon}</p>
    <div class="original-message">
      <strong>Orijinal Mesaj:</strong>
      <p>${message.mesaj.replace(/\n/g, '<br>')}</p>
    </div>
  `;
  document.getElementById("replyText").value = "";
  document.getElementById("replyModal").style.display = "flex";
}

function closeReplyModal() {
  document.getElementById("replyModal").style.display = "none";
  selectedMessageId = null;
  document.getElementById("replyText").value = "";
}

function sendReply() {
  if (!selectedMessageId) return;
  
  const cevap = document.getElementById("replyText").value.trim();
  if (!cevap) {
    alert("⚠️ Lütfen cevap metnini yazın!");
    return;
  }
  
  const btn = event.target;
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = "⏳ Gönderiliyor...";
  
  fetch(`/api/contacts/${selectedMessageId}/reply`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ cevap })
  })
  .then(response => {
    if (!response.ok) {
      return response.json().then(err => {
        throw new Error(err.message || "Cevap gönderilemedi!");
      });
    }
    return response.json();
  })
  .then(() => {
    showSuccess("✅ Cevap başarıyla gönderildi!");
    closeReplyModal();
    yukleMesajlar();
  })
  .catch(error => {
    alert("❌ Hata: " + error.message);
    console.error("Cevap gönderme hatası:", error);
  })
  .finally(() => {
    btn.disabled = false;
    btn.innerHTML = originalText;
  });
}

// Modal dışına tıklanınca kapat
document.getElementById("replyModal")?.addEventListener("click", (e) => {
  if (e.target.id === "replyModal") {
    closeReplyModal();
  }
});

// Sayfa yüklendiğinde
yukle();

// Enter tuşu ile form gönderme
document.getElementById("productForm").addEventListener("keypress", (e) => {
  if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") {
    e.preventDefault();
    if (seciliId) {
      guncelle();
    } else {
      ekle();
    }
  }
});
</script>

</body>
</html>
