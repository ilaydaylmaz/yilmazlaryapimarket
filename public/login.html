<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Admin Giriş</title>
</head>
<body>

<h1>Admin Giriş</h1>

<input id="username" placeholder="Kullanıcı Adı"><br><br>
<input id="password" type="password" placeholder="Şifre"><br><br>

<button onclick="login()">Giriş Yap</button>

<p id="error" style="color:red;"></p>

<script>
function login() {
  const usernameInput = document.getElementById("username");
  const passwordInput = document.getElementById("password");
  const errorDiv = document.getElementById("error");
  
  if (!usernameInput.value || !passwordInput.value) {
    errorDiv.innerText = "Lütfen kullanıcı adı ve şifre girin";
    return;
  }
  
  errorDiv.innerText = "";
  
  fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: 'include', // Cookie'leri gönder
    body: JSON.stringify({
      username: usernameInput.value,
      password: passwordInput.value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      localStorage.setItem('adminSession', 'true');
      window.location.href = "/admin.html";
    } else {
      errorDiv.innerText = data.message || "Hatalı giriş. Kullanıcı adı: admin, Şifre: 1234";
    }
  })
  .catch(err => {
    console.error("Login hatası:", err);
    errorDiv.innerText = "Bir hata oluştu. Lütfen tekrar deneyin.";
  });
}

// Enter tuşu ile giriş
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById("password").addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      login();
    }
  });
});
</script>

</body>
</html>
